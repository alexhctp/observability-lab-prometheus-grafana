services:
  jenkins:
    build:
      context: ./jenkins
    container_name: jenkins
    ports:
      - "0.0.0.0:8080:8080"
      - "0.0.0.0:50000:50000"
    environment:
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false
    volumes:
      - jenkins_home:/var/jenkins_home
      - jenkins_sqlite:/var/jenkins_home/sqlite
      - ./jenkins/init.groovy.d/basic-security.groovy:/var/jenkins_home/init.groovy.d/basic-security.groovy:ro

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "0.0.0.0:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      - GF_SERVER_HTTP_PORT=3000

volumes:
  jenkins_home:
  jenkins_sqlite:
